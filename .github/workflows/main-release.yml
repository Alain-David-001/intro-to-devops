name: Main CI/CD

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

env:
  AWS_REGION: eu-central-1
  ECS_CLUSTER: fruitapi-cluster
  ECS_SERVICE: fruitapi-service
  ECS_CONTAINER_NAME: fruitapi

jobs:
  build-test-release-deploy:
    name: Unit, Docker, integration, publish, deploy
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Run unit tests
        run: python -m pytest app

      - name: Set image metadata
        id: image
        run: |
          IMAGE_NAME="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/fruitapi"
          VERSION="$(cat VERSION)"
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "VERSION must use SemVer format like 1.2.3"
            exit 1
          fi
          echo "name=${IMAGE_NAME}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${IMAGE_NAME}:${VERSION}" >> "$GITHUB_OUTPUT"
          echo "latest=${IMAGE_NAME}:latest" >> "$GITHUB_OUTPUT"

      - name: Build Docker image
        run: |
          docker build \
            -t "${{ steps.image.outputs.tag }}" \
            -t "${{ steps.image.outputs.latest }}" \
            .

      - name: Create Docker network
        run: docker network create fruitapi-ci

      - name: Run MySQL container
        run: |
          docker run --rm -d --name fruitapi-mysql --network fruitapi-ci \
            -e MYSQL_ROOT_PASSWORD=root \
            -e MYSQL_DATABASE=fruitapi \
            -e MYSQL_USER=fruitapi \
            -e MYSQL_PASSWORD=fruitapi \
            mysql:8.4

      - name: Wait for MySQL
        run: |
          for attempt in {1..30}; do
            if docker exec fruitapi-mysql mysqladmin ping -h 127.0.0.1 -u root -proot --silent; then
              exit 0
            fi
            sleep 2
          done
          docker logs fruitapi-mysql
          exit 1

      - name: Run Docker container
        run: |
          docker run --rm -d --name fruitapi-ci --network fruitapi-ci -p 8000:8000 \
            -e FRUITAPI_STORE=mysql \
            -e DB_HOST=fruitapi-mysql \
            -e DB_PORT=3306 \
            -e DB_NAME=fruitapi \
            -e DB_USER=fruitapi \
            -e DB_PASSWORD=fruitapi \
            "${{ steps.image.outputs.tag }}"

      - name: Wait for FruitAPI
        run: |
          for attempt in {1..30}; do
            if curl -fsS http://127.0.0.1:8000/health; then
              exit 0
            fi
            sleep 2
          done
          docker logs fruitapi-ci
          exit 1

      - name: Run integration tests
        run: BASE_URL=http://127.0.0.1:8000 python -m pytest tests

      - name: Stop Docker containers
        if: always()
        run: |
          docker stop fruitapi-ci || true
          docker stop fruitapi-mysql || true
          docker network rm fruitapi-ci || true

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Docker image
        run: |
          docker push "${{ steps.image.outputs.tag }}"
          docker push "${{ steps.image.outputs.latest }}"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy image to ECS
        run: |
          CURRENT_TASK_DEFINITION_ARN=$(aws ecs describe-services --cluster "$ECS_CLUSTER" --services "$ECS_SERVICE" --query 'services[0].taskDefinition' --output text)

          aws ecs describe-task-definition --task-definition "$CURRENT_TASK_DEFINITION_ARN" --query 'taskDefinition' --output json > current-task-definition.json

          python - <<'PYDEPLOY'
          import json

          with open('current-task-definition.json', encoding='utf-8') as source:
              current = json.load(source)

          allowed_keys = {
              'family',
              'taskRoleArn',
              'executionRoleArn',
              'networkMode',
              'containerDefinitions',
              'volumes',
              'placementConstraints',
              'requiresCompatibilities',
              'cpu',
              'memory',
              'pidMode',
              'ipcMode',
              'proxyConfiguration',
              'inferenceAccelerators',
              'ephemeralStorage',
              'runtimePlatform',
          }
          task_definition = {
              key: value
              for key, value in current.items()
              if key in allowed_keys and value not in (None, [], {})
          }

          image = '${{ steps.image.outputs.tag }}'
          container_name = '${{ env.ECS_CONTAINER_NAME }}'
          for container in task_definition['containerDefinitions']:
              if container['name'] == container_name:
                  container['image'] = image
                  break
          else:
              raise SystemExit(f'Container {container_name} not found in task definition')

          with open('new-task-definition.json', 'w', encoding='utf-8') as target:
              json.dump(task_definition, target)
          PYDEPLOY

          NEW_TASK_DEFINITION_ARN=$(aws ecs register-task-definition --cli-input-json file://new-task-definition.json --query 'taskDefinition.taskDefinitionArn' --output text)

          aws ecs update-service --cluster "$ECS_CLUSTER" --service "$ECS_SERVICE" --task-definition "$NEW_TASK_DEFINITION_ARN"

          aws ecs wait services-stable --cluster "$ECS_CLUSTER" --services "$ECS_SERVICE"
