name: PR Unit Tests

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Run unit tests
        run: python -m pytest app

      - name: Comment test result on PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- fruitapi-unit-tests -->';
            const passed = '${{ job.status }}' === 'success';
            const body = [
              marker,
              '### Unit test result',
              '',
              `${passed ? 'Passed' : 'Failed'}: \`python -m pytest app\``,
              '',
              `Workflow: ${context.workflow}`,
            ].join('\n');
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.rest.issues.listComments({ owner, repo, issue_number });
            const previous = comments.data.find(comment => comment.body?.includes(marker));
            if (previous) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: previous.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }
